<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script>
        /*
        [조건]
        1. 사용자가 이메일 입력창에 대소문자를 섞어 
        "Mirim@NaVer.Com"이라고 입력하더라도 정상 인식하도록,
        입력값(emailInput)을 모두 소문자로 변환하여 변수 lowerEmail에 담으시오.

        2. 문자열 내장 메서드를 사용하여 lowerEmail 안에 
        네이버 도메인 텍스트인 "naver.com" 문자열이 포함되어 있는지 여부를 판별하시오.

        3. 포함 여부가 참(true)이면서 동시에(&&) lowerEmail 
        전체 글자 수가 15글자 이상일 때만
        console.log("인증 가능한 이메일입니다.");를 출력하는 복합 조건문을 작성하시오.

    */
        let emailInput = "Mirim@NaVer.Com";

        // 1. 문자열 전체를 소문자로 변환
        let lowerEmail = emailInput.toLowerCase();

        // 2 & 3. 포함 여부와 글자 수를 && 연산자로 묶는 조건문 작성
        if (lowerEmail.includes("naver.com") && lowerEmail.length >= 15) {
            console.log("인증 가능한 이메일입니다.");
        }
    </script>
</body>

</html>
