<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script>
        /*[조건]
        1. 회원가입창에 사용자가 아이디를 입력할 때 앞뒤로 공백이
        섞인 문자열 "mirim123"형태로 제출되었습니다.
        이 입력값(inputId)의 앞뒤 불필요한 공백을 완전히 제거하여 
        변수 cleanId에 저장하시오.
        2.공백이 제거된 cleanId 변수의 글자 수(길이) 속성을 활용하여, 
        아디이의 글자 수 0과 같다면 alert("아이디를 올바르게 입력하세요!");를 실행하는 조건문을 완성하시오.
        */
    let input ="  mirim123   ";
    let cleanId=input.trim();

    if(cleanId.length===0){
        alert("아이디를 올바르게 입력하세요!");
    }
    </script>
</body>

</html>
