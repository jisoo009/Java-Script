<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script>
        /*[조건]

        1. 현재 대여 중인 도서 객체들이 담긴 borrowedBooks 배열에 새로 대여가 신청된 
        도서 객체인 newBook을 맨 뒤에 삽입(추가)하는 배열 내장 메서드를 사용하시오.
        
        2. 추가한 직후, 배열의 내장 성질(property)을 활용하여 
        현재 대여 중인 총 도서 종류의 개수를 계산하여 변수 totalCount에 대입하는 코드를 작성하시오.
*/

        let borrowedBooks = [
            { title: "HTML 가이드", author: "김미림" },
            { title: "알고리즘 입문", author: "이소프트" }
        ];
        let newBook = { title: "자바스크립트 완성", author: "박응용" };

        // 1. 배열 맨 뒤에 객체 요소를 추가
        borrowedBooks.push(newBook);

        // 2. 배열의 현재 길이를 구하여 변수에 저장
        let totalCount = borrowedBooks.length;
    </script>
</body>

</html>
