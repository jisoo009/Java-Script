<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script>
        /*[조건]
        1. 기존 주문 내역 배열인 orderList에 새로운 주문 객체인 
            newOrder를 맨 뒤에 삽입(추가)하는 배열 내장 메서드를 사용하시오.
            
        2.추가한 직후, 배열의 특성(property)을 활용하여 현재까지 
        쌓인 총 주문 건수를 변수 totalOrders에 저장하는 코드를 작성하시오.
        */

        let orderList = [
            { name: "아메리카노", count: 1 },
            { name: "카페라떼", count: 2 }
        ];
        let newOrder = { name: "바닐라라떼", count: 1 };

        // 위 조건을 만족하도록 아래에 코드를 작성하시오.
        orderList.push(newOrder);

        let totalOrders = orderList.length;
    </script>
</body>
