<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script>
        /*[조건]

        1.학생들의 성적 객체가 담긴 studentScores 배열의 모든 요소를 
        처음부터 끝까지 순회하는 전통적인 for문을 작성하시오. 
        (조건식에 배열의 길이를 나타내는 속성을 활용할 것)

        2.반복문 내부에서 학생의 점수(score)가 90점 미만인 차례를 만나면, 
        아래 코드를 실행하지 않고 즉시 다음 반복 차례(증감식)로 
        건너뛰도록 흐름 제어 키워드(continue)를 사용하시오.

        3.90점 이상인 학생들만 조건문을 통과하여, 
        해당 학생의 이름(name)이 미리 준비된 배열 장학생명단의 
        맨 뒤에 순차적으로 쌓여 저장되도록 전체 스크립트 로직을 완성하시오.
*/
        const studentScores = [
            { name: "김미림", score: 85 },
            { name: "이소프트", score: 95 },
            { name: "박웹앱", score: 92 }
        ];
        let 장학생명단 = [];

        // 1. 배열 전체를 순회하는 for문 작성
        for (let i = 0; i < studentScores.length; i++) {
            // 2. 90점 미만일 때 코드 건너뛰기(skip) 처리
            if (studentScores[i].score < 90) {
                continue;
            }
            // 3. 조건 통과 시 장학생명단 배열에 학생 이름 추가
            장학생명단.push(studentScores[i].name);
        }
    </script>
</body>

</html>
