<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

</head>

<body>
    <script>
        //1. slice 실무 활용예제

        //2. repace 실무 활용예제 (with 정규식)
        //3. padStart 실무 활용예제
        //4. charAt 실무 활용예제
        //5. split 실무 활용예제
        //6. endsWith 실무 활용예제

        // 1-1 긴 텍스트를 "더보기" 처리
        const longString = "자바스크립크 실무 마스터: 기초에서 심화까지 한 번에 끝내기";

        const truncateTitle = (title, maxLength) => {
            if (title.length > maxLength) {
                return title.slice(0, maxLength) + ".....";
            } else {
                return title;
            }
        };

        console.log(truncateTitle(longString, 10))

        // 2-1 전화 번호 뒷자리 ****로 마스킹 처리
        let phoneNumber = "010-1234-5678";
        const hiddenNumber = (number) => {
            if (number.length === 13) {
                return number.slice(0, -4) + "****";
            } else {
                return number;
            }
        };
        console.log(hiddenNumber(phoneNumber));

        //2. replace 실무 활용예제 (with 정규식)
        // 2-1 전화번호를 입력받아 db에 저장 => 01012345678
        /* 정규식
        - / / 사이에 작성
        - \는 아니다라는 의미
        - D는 숫자를 의미 : \D = > 숫자가 아닌 것 
        -option : g => 모두 */
        phoneNumber = "010-1234-5678";
        const clearNumber = phoneNumber.replace(/\D/g, "");
        console.log(clearNumber);
        let str = "Welcome Jeju!! Jeju!!";
        console.log(str.replace(/Jeju/g, "Seoul"));

        //3. padStart 실무 활용예제
        // 3-1 쇼핑 사이트에서 주문 번호나 회원번호를 생성하고 관리하기 편하도록
        // let memberNumber = 234;

        // //MN-000234
        // const generateMemberNumber = (number, digit) => {
        //     return String((memberNumber.padStart(digit, "0")));

        // }
        // console.log(generateMemberNumber(memberNumber, 6)); //MN-000234

        //4. charAt 실무 활용예제
        const checkGender = (sn) => {
            let gender = "";
            const genderCode = sn.charAt(7);
            if (genderCode == 1 || genderCode == 3) {
                gender = "내국인 남성";
            } else if (genderCode == 2 || genderCode == 4) {
                gender = "내국인 여성";
            } else if (genderCode == 5) {
                gender = "외국인 남성";
            } else if (genderCode == 6) {
                gender = "외국인 여성";
            }
            else {
                gender = "알 수 없음";
            }
            return gender;

        }
        console.log(checkGender("091225-4057213")); //내국인 여성
        //5. split 실무 활용예제
        //url을 통해 특정 파라미터를 추출하기 (카테고리, 물품명)
        const url = "https://myshop.com/products/electronics/iphone15";
        const pageSegment = url.split("/");
        let size = pageSegment.length;
        //카테고리 출력
        console.log(`카테고리 : ${pageSegment[size - 2]}`);
        // console.log(url.slice(28, 39));
        //물품명 출력
        console.log(`제품명 : ${pageSegment[size - 1]}`);
        //console.log(url.slice(40));

        //**************************************로그파일을 통해 시간과 사용자 알아내기********************************************
        const csvData = "2026-04-29,Login_Success,user_01\n2024-04-29,Login_Fail,user_02";
        const log = csvData.split("\n");

        console.log(log);
        for (line of log) {
            [date, status, user] = line.split(",");//배열 분할 할당
            //로그인 성공한 사람의 id와 성공시간을 출력해보자.
            if (status == "Login_Success") {
                console.log(`${user}가 ${date}에 로그인에 성공했습니다.`);
            }
        }
        //6. endsWith 실무 활용예제 
        //jpg, png만 업로드 가능하다고 가정하자.
        const checkFileName = (fileName) => {
            if (fileName.endsWith("JPG")) {
                return "업로드 가능합니다.";
            } else {
                return "업로드 불가능합니다.";
            }
        }
        console.log(checkFileName("my_photo.JPG")); // 업로드 가능합니다.
        console.log(checkFileName("my_photo.gif")); // 업로드 불가능합니다.

    </script>
</body>
