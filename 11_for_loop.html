<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <script>
      let brands = [
        "애플",
        "구글",
        "마이크로스프트",
        "삼성",
        "아마존",
        "테슬라",
      ];

      console.log(brands[0]);
      console.log(brands[1]);
      console.log(brands[2]);
      console.log(brands[3]);
      console.log(brands[4]);
      console.log(brands[5]);

      //for문 출력
      for (let i = 0; i < brands.length - 1; i++) {
        console.log(brands[i]);
      }

      //실습
      console.log("구입가능한 음료");
      const drinkList = [
        { name: "오렌지", price: 1000 },
        { name: "파워에이드", price: 1200 },
        { name: "커피", price: 700 },
        { name: "보리음료", price: 1200 },
        { name: "코카콜라", price: 1800 },
      ];
      let inputCoin = 1000;
      let size = drinkList.length;
      let availableDrink = []; //구입 가능한 음료수 배열
      for (let i = 0; i < size; i++) {
        let drink = drinkList[i];
        // console.log(drink);

        if (inputCoin >= drink.price) {
          availableDrink.push("이름: " + drink.name);
          availableDrink.push("가격: " + drink.price);
        }
      }
      console.log(availableDrink);

      //break
      for (let i = 0; i < 10; i++) {
        if (i == 5) {
          break;
        }
      }
      console.log(i);

      //continue
      for (let i = 0; i < 10; i++) {
        if (i == 5) {
          continue;
        }
      }
      console.log(i);
    </script>
  </body>
</html>
