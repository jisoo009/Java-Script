<!DOCTYPE html>
<html lang="en">

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

<body>
    <select name="drinktype" id="drinktype"></select>
    <br />
    <select name="drinktype" id="drinktype2"></select>
    <br />
    <button onclick="search1()">조회1(문자열)</button>
    <button onclick="search2()">조회2(push, join)</button>
    <table class="table1">
        <thead>
            <th>학번</th>
            <th>이름</th>
        </thead>
        <tbody>
            <tr>
                <td>2101</td>
                <td>강하윤</td>
            </tr>
            <tr>
                <td>2102</td>
                <td>김기범</td>
            </tr>
            <tr>
                <td>2103</td>
                <td>김진수</td>
            </tr>
            <tr>
                <td>2104</td>
                <td>방예린</td>
            </tr>
        </tbody>
    </table>

    <!--db에서 불러올 데이터를 보여줄 테이블-->
    <table class="table1">
        <thead>
            <th>음료</th>
            <th>가격</th>
        </thead>
        <tbody id="tbody1"></tbody>

    </table>
    <script>
        //자바스크립트 실무에서 가장 많이 사용하는 객체(**)
        let brands = ["애플", "구글", "메타", "삼성", "아마존", "마이크로소프트"];
        //1. toString() : 쉼표를 기준으로 하나의 문자열로 변환
        console.log(brands.toString());     // 애플,구글,메타,삼성,아마존,마이크로소프트

        //2. join() : 파라미타로 전달된 문자를 이용해서 하나의 문자열로 합치기
        console.log(brands.join(""));       //애플구글메타삼성아마존마이크로소프트
        console.log(brands.join("-"));      //애플-구글-메타-삼성-아마존-마이크로소프트

        //2-1. +=  => db에서 데이터를 읽어와 동적으로 표를 이용해서 출력
        //장점 : 가독성, 단점 : 성능 저하
        const search1 = () => {
            //1. 데이터 읽어오기
            const drinkList = [
                { name: "오렌지", price: 1000 },
                { name: "파워에이드", price: 1200 },
                { name: "커피", price: 700 },
                { name: "보리음료", price: 1200 },
                { name: "코카콜라", price: 1800 },
            ];
            //2. 데이터 수에 맞게 태그 생성
            let tagsStr = "";
            for (drink of drinkList) {
                tagsStr += "<tr>";
                tagsStr += "<td>" + drink.name + "</td>";
                tagsStr += "<td>" + drink.price + "</td>";
                tagsStr += "</tr>";
            }
            console.log(tagsStr);
            //3. 태그 랜더링(innderHTML)해서 화면에 뿌리기
            document.getElementById("tbody1").innerHTML = tagsStr;
        }

        //2-2. join() 실무 활용예제 => db에서 데이터를 읽어와 동적으로 표를 이용해서 출력
        //push(), join()
        const search2 = () => {
            const drinkList = [
                { name: "오렌지", price: 1000 },
                { name: "파워에이드", price: 1200 },
                { name: "커피", price: 700 },
                { name: "보리음료", price: 1200 },
            ];
            let tagsStr = [];
            for (drink of drinkList) {
                tagsStr.push("<tr>");
                tagsStr.push("<td>" + drink.name + "</td>");
                tagsStr.push("<td>" + drink.price + "</td>");
                tagsStr.push("</tr>");

            }
            console.log(tagsStr);

            document.getElementById("tbody1").innerHTML = tagsStr.join("");

        };
        //장점 : 성능, 단점 : x

        //3. pop() : 배열의 마지막 요소 삭제, 리턴: 마지막 요소
        brands = ["애플", "구글", "메타", "삼성", "아마존", "마이크로소프트"];
        console.log(brands.pop());  //마이크로소프트
        console.log(brands);

        //4. push() : 배열의 마지막에 요소 추가, 리턴: 길이 + join()
        console.log(brands.push("테슬라")); //6
        console.log(brands);

        //5. unshift() : 배열의 처음에 요소 추가, 리턴: 길이 
        //단점 : 실무 활용도 낮음 
        console.log(brands.push("하이닉스")); //7
        console.log(brands);

        //5-1. uinshift() 실무 활용
        function loadDrinkList() {
            const types = [
                { text: "이온음료", code: "A" },
                { text: "커피", code: "B" },
                { text: "콜라", code: "C" },
            ];
            // types.unshift({ text: "전체", code: "All" });

            const tags = [];
            for (type of types) {
                tags.push("<option value= " + type.code + ">" + type.text + "</option>");
            }
            return tags;
            // types.unshift({ text: "전체", code: "All" });

        }
        const tagsList = loadDrinkList();
        //  console.log(tagsList);
        //tagsList.unshift({ text: "전체", code: "All" });
        document.getElementById("drinktype").innerHTML = tagsList.join("");

        //unshift() 해오기
        //  { text: "전체", code: "All" },


        //unshift할 대상이 있는 경우 매개변수로 받아서 맨 위에 올리기 
        //만약 unshift할 대상이 없는 경우 db에서 읽어온 데이터만 뿌리기
        const loadDrinkList2 = (plus) => {
            const types = [
                { text: "이온음료", code: "A" },
                { text: "커피", code: "B" },
                { text: "콜라", code: "C" },
            ];

            const tags = [];

            for (type of types) {
                tags.push("<option value= " + type.code + ">" + type.text + "</option>");
            }
            if (plus) {
                tags.unshift("<option value= " + plus.code + ">" + plus.text + "</option>");
            }
            return tags;
        };
        //매개변수가 없는 경우
        // const tagsList2 = loadDrinkList2();
        // document.getElementById("drinktype2").innerHTML = tagsList.join("");

        //매개변수가 있는 경우
        const tagsList2 = loadDrinkList2({ text: "전체", code: "All" });
        document.getElementById("drinktype2").innerHTML = tagsList2.join("");



        //6. shift() : 배열의 맨 앞 요소를 제거, 요소가 리턴, 배열 변화
        brands = ["애플", "구글", "메타", "삼성", "아마존", "마이크로소프트"];
        console.log(brands.shift());    //애플
        console.log(brands);


        //7.concat() : 배열을 이어 붙이기
        let arr1 = ["강하윤", "김기범"];
        let arr2 = ["김진수", "방예린"];
        let arr3 = ["오세영", "윤기진"];
        let arr4 = arr1.concat(arr2);
        let arr5 = arr1.concat(arr2, arr3);
        console.log(arr4);
        console.log(arr5);

        //****** 전개 연산자(spread operator)
        let arr6 = [...arr1, ...arr2, ...arr3];
        console.log(arr6);


        //8.splice(p1, p2, p3) : 특정한 위치에 요소를 추가하거나 삭제 가능
        //p1: 추가할 요소의 위치
        //p2: 삭제할 갯수
        //p3: 추가할 요소

        brands = ["애플", "구글", "메타", "삼성", "아마존", "마이크로소프트"];
        //구글 앞에 "하이닉스" 삽입
        brands.splice(1, 0, "하이닉스");
        console.log(brands);
        //삼성, 아마존 삭제
        brands.splice(4, 2);
        console.log(brands);
        //['애플', '하이닉스', '구글', '메타', '마이크로소프트']
        //로직으로 구현: "구글" 앞에 "테슬라" 삽입
        brands.splice(brands.indexOf("구글"), 0, "테슬라");
        console.log(brands);

        //9.slice(start, end) : end-1까지 잘라내 배열로 리턴
        //['애플', '하이닉스', '테슬라', '구글', '메타', '마이크로소프트']
        console.log(brands.slice(2, 5));    //['테슬라', '구글', '메타']

        //10.***************************sort()**************************
        /* - 정렬 
        - 기준 : 문자열(오름차순)
        - 숫자 정렬???? 따라서 숫자일 경우 별도의 알고리즘을 동작시켜야 한다.
        자바스크립트의 비교 함수의 동작원리 =>
        엔진이 내부적으로 알고리즘(크롬의 경우 TimSort알고리즘)을 갖고 있으며
        함수를 매개변수로 사용한다며, 함수는 파라미터로 a, b를 갖는다.
        반환값에 따라 다음과 같이 동작한다.
        if (a > b) return 1; 양수이면 자리를 바꾼다.
        else if (a > b ) return -1; 음수이면 자리를 바꾸지 않는다.
        else 0; 순서를 바꾸지 않는다.
        => if, else if, else의 세 줄을 한 줄로 바꾸면......
        return a-b

        형식
        const 결과배열 = 대상배열.sort((a,b) => {
        return a-b;(오름차순의 경우)
        return b-a;(내림차순의 경우)
        });
        */

        console.log(brands.sort());
        let point = [100, 98, 95, 87, 79, 68];
        console.log(point.sort());  //[100, 68, 79, 87, 95, 98]
        const ascPoints = point.sort((a, b) => {    //오름차순
            return a - b;

        });
        console.log(ascPoints);
        const descPoints = point.sort((a, b) => {   //내림차순
            return b - a;

        });
        console.log(descPoints);

        //10-1. sort()의 활용 => 가격을 기준으로 오름차순 정렬

        const drinkList = [
            { name: "오렌지", price: 1000 },
            { name: "파워에이드", price: 1200 },
            { name: "커피", price: 700 },
            { name: "보리음료", price: 1200 },
        ];
        //inputKey = price
        //[inputKey]
        // const ascdrinkList = drinkList.sort((a, b) => {
        //     return a.price - b.price;
        // });
        // console.log(ascdrinkList);

        //11. ******************** filter() ********************
        //배열에서 특정 조건에 맞는 요소만 배열로 리턴, 원 배열은 변하지 않는다.
        //drinkList에서 1000원으로 구입 가능한 음료를 찾아라. => for - of
        let available = [];
        for (let drink of drinkList) {
            if (drink.price <= 1000) {
                available.push(drink);
            }
        }
        console.log(available);
        console.log(drinkList); //원 배열은 변하지 않는다.

        available = drinkList.filter((drink) => {
            return drink.price <= 1000;
        });
        console.log(available);


        // 과제 1 : 필터 조건 : 악세서리 중 10만원 이하인 것을 찾아라.
        // 과제 2 : 필터 조건 : 카테고리 중 악세서리인 것을 찾아라.
        // 과제 3 : 필터 조건 : 카테고리 중 악세서리이며, 가격이 10만원 이하인 것을 찾아라.

        let products = [
            { id: 1, name: "맥북 프로", category: "electronics", price: 2500000 },
            { id: 2, name: "아이패드 에어", category: "electronics", price: 900000 },
            { id: 3, name: "기계식 키보드", category: "accessories", price: 150000 },
            { id: 4, name: "허브 매트", category: "accessories", price: 30000 },
        ];

        let result1 = products.filter((product) => {
            return product.category === "accessories" && product.price <= 100000;
        });
        console.log(result1);

        let result2 = products.filter((product) => {
            return product.category === "accessories";
        });
        console.log(result2);

        let result3 = products.filter((product) => {
            return product.category === "accessories" && product.price <= 100000;
        });
        console.log(result3);


        //12.map() : 배열의 모든 요소를 하나씩 돌면서 실행하고 새로운 배열을 생성하는 함수
        //기존 배열은 변화하지 않는다.
        let userList = [
            {
                firstName: "현민",
                lastName: "이",
                email: "lee@gmail.com",
            }, {
                firstName: "지수",
                lastName: "임",
                email: "lim@gmail.com",
            }, {
                firstName: "하은",
                lastName: "장",
                email: "jang@gmail.com",
            }
        ];
        // console.log(userList);
        //12-1 map()을 활용하여 fullName, email을 갖는 newUserList를 생성하시오.

        let newUserList = userList.map((user) => {
            return {
                fullName: user.lastName + user.firstName,
                email: user.email,
            }
        });
        console.log(newUserList);

        //12-2 map()을 활용하여 products배열을 화면에 표로 나타내시오.
        //세자리마다 찍어보기 
        const productsTable = products.map((product) => {
            const formatPrice = product.price.toLocaleString();//3자리씩 표현
            return `<div> <h3>${product.name}: ${formatPrice}</h3><div>`;
        });
        //  document.getElementById("mapResult").innerHTML = productsTable.join("");

        //13. reduce(p1, p2, p3, p4) : 누적합을 구하는 함수
        /*형식
            배열.reduce((누적값, 현재값, 인덱스, 원본배열)=>{
                return 다음 누산기에 넘겨줄 값
            }, 초기값);
        */
        products = [
            { id: 1, name: "맥북 프로", category: "electronics", price: 2500000 },
            { id: 2, name: "아이패드 에어", category: "electronics", price: 900000 },
            { id: 3, name: "기계식 키보드", category: "accessories", price: 150000 },
            { id: 4, name: "허브 매트", category: "accessories", price: 30000 },
        ];
        //단가의 합
        //for 
        // for (let product of products) {
        //     let sum+= product.price;
        //     return sum;
        // }
        //console.log(product);
        let sumOfPrice = products.reduce((sum, product) => {
            sum += product.price;
            return sum;
        }, 0)
        console.log(sumOfPrice);

        // points = [100, 98, 95, 87, 79, 68];
        // let sumOf = poins.reduce((sum, p) => {
        //     sum += p.points;
        //     return sum / 6;
        // }, 0);
        // console.log(sumOf); //527

        drinkList = [
            { name: "오렌지", price: 1000 },
            { name: "파워에이드", price: 1200 },
            { name: "커피", price: 700 },
            { name: "보리음료", price: 1200 },
        ];
        let sum = drinkList.reduce((sum, p) => {
            sum += p.price;
            return sum;
        }, 0);
        console.log(sum);

    </script>
