<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script>
        //String 내장 함수
        //1. 속성(property) : length

        let str = "Welcome Seoul";
        console.log(str.length);    // 0~12

        //2. indexof(대상, 시작위치) : 찾고자 하는 문자열의 시작 인덱스 리턴 (여러개라면 첫 문자열)
        //찾고자 하는 대상이 없으면 리턴은 -1 
        console.log(str.indexOf("Seoul"));
        str = "Welcome Seoul Seoul";
        console.log(str.indexOf("Seoul", 9)); // 첫 번재 서울보다 큰 위치만 주면 된다.
        console.log(str.indexOf("Jeju"));   //-1

        //활용 : 전화번호 입력 시 -없이 입력 => - 있다면 에러 메세지 출력
        let tel = "010-0000-0000";
        if (tel.indexOf("-") !== -1) {
            console.log("- 없이 입력하세요");
        }
        else {
            console.log("맞는 형식으로 입력하였습니다.");
        }

        //3. lastIndexOf() : 뒤에서부터 찾아서 리턴(여러개라면 첫 문자열)
        console.log(str.lastIndexOf("Seoul"));


        //***4. slice() : 문자열을 (시작위치, 마지막 위치-1)만큼 잘라내기
        //4. slice() : 문자열을 (시작위치, 마지막 위치-1)만큼 잘라내기
        str = "Welcome Seoul";
        console.log(str.slice(8, 13)); //8 9 10 11 12
        console.log(str.slice(8));
        //seoul 이 어디에 있는지 모를 때
        console.log(str.slice(str.indexOf("Seoul")));
        console.log(str.slice(-5)); //Seoul
        console.log(str.slice(-5, -2)); // (-5, -4, -3) 실제로 - 많이 사용

        //5. substring() : 문자열을 (시작위치, 마지막 위치-1)만큼 잘라내기
        // -지원 안한다. 뒤에서부터 자르는 것을 지원 하지 않는다. => - 을 만나면 무조건 0으로 바꾼다.
        str = "Welcome Seoul";
        console.log(str.substring(8, 13)); //8 9 10 11 12
        console.log(str.substring(8));
        console.log(str.substring(-5));//str.substring(0)
        console.log(str.substring(-5, -2)); // 

        //6. substr() : 문자열을 (시작위치, 길이)만큼 잘라내기
        //길이를 명확히 아는 경우 매우 효율적 : 
        let nowdate = "20260420";
        let year = nowdate.substr(0, 4);
        let month = nowdate.substr(4, 2);
        let date = nowdate.substr(6, 2);

        console.log(year);
        console.log(month);
        console.log(date);
        // slice vs substring vs substr
        /*  slice : 가장 유연하고 현대적인 메서드, 음수처리 가능 (slice를 많이 사용하는 것을 권장)
        /*  slice : 가장 유연하고 현대적인 메서드, 음수처리 가능
            substring : slice와 유연하지만 인덱스가 음인 경우 처리가 다르다.
            substr : 인덱스가 아닌 글자 수를 기준으로 하지만 현재 웹표준으로 권장하지 않는다.
        */
        //7. replace(str1, str2) : str1 을 str2로 교체하는 함수 

        str = "Welcome Jeju! Jeju";
        console.log(str.replace("Jeju", "Seoul"));  //Welcome Seoul! Jeju
        console.log(str.replace("Jeju", "Seoul"));


        // 정규식 (regular expression)
        // - 특정한 포맷을 맞출 때 (생년월일, 전화번호, 이메일, 아이디(영문자, 14글자 등) 등등 )
        //정규식 매우 어렵지만 정규식을 사용하면 간단하게 적을 수 있음


        //**8. toUpperCase() : 대문자로 변환
        //str 대문자로
        //**9. toLowerCase() : 소문자로 변환
        //str 소문자로
        //사용자는 다양핫게 입력하게 되므로....
        //(프론트엔드) 입력된 내용을 대(소)문자로 변환하면 된다. 예) db제품번호 대문자로

        str = "Welcome Jeju! Jeju";
        console.log(str.toUpperCase);
        console.log(str.toLowerCase);

        //10. concat() : 여러 문자열을 합치지, 합칠 문자열의 갯수에는 제한이 없다.
        let firstName = "John";
        let lastName = "Doe";
        let fullName = firstName.concat(" ", lastName, ".", "Nice to meet you");

        console.log(fullName);

        //11. trim() : 문자열의 앞, 뒤 공백을 없애기
        // const middleTrim = () => { };
        let name = "             에이스         2학년 1반             ";
        console.log(name.trim());

        //12. *****매우 중요!! padStart(문자열 전체 길이, 채울 문자열) : 현업에서 가장 만힝 사용하는 함수 중 하나
        // 득정 문자로 앞을 채운다.
        //월을 입력받아, 워링 한자리 인 경우  "0"을 붙여서 출력 (포맷을 맞추기 위해);

        // month = prompt("월을 입력하세요.");
        //1)
        // if (month) {
        //     if (month > 0 || month <= 9) {
        //         console.log("0" + month + "월");
        //     }
        //     else if (month >= 10 || month <= 12) {
        //         console.log(month + "월");
        //     }
        //     else {
        //         console.log("다시 입력하세요.");
        //     }
        // }
        //2)
        // while (month.length < 2) {
        //     month = "0" + month;
        // }

        console.log(month.padStart(2, "0"));

        //13. padEnd (문자열 전체 길이, 뒤에 채울 문자열) : 거의 사용하지 않는다.

        //14. *charAt(인덱스): 인덱스에 해당하는 글자 하나를 리턴
        str = "A000001";
        if (str.charAt(0) === "A") {
            console.log("관리자님 환영합니다.");
        }

        //15. charCodeAt(인덱스): 인덱스에 해당하는 글자 유니코드를 리턴
        //딱히 중요하지 않음. 게임 코드를 작성할 때는 필요함.
        str = "힣";
        console.log(str.charCodeAt(0));     //55203
        str = "가";
        console.log(str.charCodeAt(0));     //44032

        str = "A000001";
        console.log(str.charCodeAt(0));     //65


        /*16.*******************************************************
        split(파라미터) : 파리미터로 전달받은 문자열을 기준으로 문자열을 쪼갠다.
        리턴 타임은 배열이다.  */
        let emails = "john@gmail.com,jane@gmail.com,hong@hanmail.com";
        //서버로부터 json형식으로 이메일이 전송되어 온다고 가정하자.
        let email = emails.split(",");
        console.log(email);

        //17.** startsWith() : 파라미터로 시작하는지 여부를 boolean으로 반환
        let url = "website.com";
        //https://  위의 주소가 적절한 웹사이트 주소인지 판결해보세요.
        //console.log(url.startsWith("https://"));  //false
        if (url.startsWith("https://")) {
            console.log("적절한 주소입니다.");
        } else {
            console.log("적절한 주소가 아닙니다.");
        }

        //18.** endsWith() : 파라미터로 종료하는지 여부를 boolean으로 반환


    </script>
</body>

</html>
