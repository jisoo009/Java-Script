<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <script>
      /* 객체
        -파이썬의 딕셔너리와 유사
        -관련있는 데이터를 하나로 담기 위해 사용
        -{ }
        -{키(key) : 값(value)}
        -키 값은 유일하다.
        -키 값은 문자열(String)이다.
        -값 : 문자열, 숫자, boolean, [], {}......
        -순서가 반드시 유지되는 것은 아니다.(그러나 ES6이후 가급적 유지하려고 노력한다.)
        */

      let student = {
        name: "임지수",
        age: 16,
        phone: "010-1111-2222",
        address: "경기도 시흥시",
      };
      console.log(student);
      //1. 키에 숫자가 올 수 없다.
      let person = {
        111: "모두 1",
        222: "모두 2",
      };
      console.log(person);

      //2. 키 값을 가져오는 함수 : Object.keys()
      let keys = Object.keys(person);
      console.log(keys);
      console.log(keys[0]);

      //3. 값을 가져오기 : 객체명.키
      //변수 scope(범위)
      let name = student.name;
      console.log(name);

      //4. 객체의 값 변경 : 객체명.키 = 값
      student.name = "임자수";
      console.log(student);

      //5. 객체에 새로은 키와 값 추가 : 객체명.키 = 값
      student.bloodType = "A";
      console.log(student);

      //6. 객체를 생성하는 다른 방법
      let person2 = {};
      person2.name = "유재석";
      person2.age = 50;
      console.log(person2);

      //7. Object의 특정 키에 접근하는 방법(!!!중요)
      //객체이름["키"] => 사용자가 무슨 값을 찾고 싶은지 모를 때
      console.log(student.bloodType);
      console.log(student["bloodType"]); // 많이 사용!!

      let userInputkey = prompt(
        "알고 싶은 정보(name, age, phone, address, bloodType)",
      );
      console.log(userInputkey, ": ", student[userInputkey]);
    </script>
  </body>
</html>
